<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Miza"/>
<meta name="theme-color" content="#0A0A0F"/>
<link rel="manifest" href="./manifest.json"/>
<title>Miza — Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0A0A0F;
  --surface: #13131A;
  --surface2: #1C1C26;
  --surface3: #252532;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0F0F5;
  --text2: #9090A8;
  --text3: #5A5A72;
  --accent: #7C6EF5;
  --accent2: #5B4FD4;
  --accent-glow: rgba(124,110,245,0.15);
  --green: #22D09A;
  --green-bg: rgba(34,208,154,0.1);
  --red: #F06060;
  --red-bg: rgba(240,96,96,0.1);
  --amber: #F5B942;
  --amber-bg: rgba(245,185,66,0.1);
  --blue: #60A5FA;
  --blue-bg: rgba(96,165,250,0.1);
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 24px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-h: 68px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  overscroll-behavior: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: var(--text); background: none; border: none; }
input:focus, select:focus, textarea:focus { outline: none; }
a { color: inherit; text-decoration: none; }
.display { font-family: 'Space Grotesk', sans-serif; }

/* LAYOUT */
#app { display: flex; flex-direction: column; min-height: 100vh; }
.view { display: none; flex-direction: column; flex: 1; padding-bottom: calc(var(--nav-h) + var(--safe-bottom)); }
.view.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 24px; }

/* TOP BAR */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar-title { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 600; }
.top-bar-action { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,13,20,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px 8px; gap: 4px; cursor: pointer; transition: opacity 0.15s;
}
.nav-icon { font-size: 22px; line-height: 1; transition: transform 0.15s; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.02em; transition: color 0.15s; }
.nav-item.active .nav-label { color: var(--accent); }
.nav-item.active .nav-icon { transform: scale(1.1); }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 20px);
  right: 20px;
  z-index: 90;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(124,110,245,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(124,110,245,0.4); }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px;
  margin-bottom: 12px;
}
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }

/* METRIC GRID */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
}
.metric-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.metric-value { font-family: 'Space Grotesk'; font-size: 22px; font-weight: 700; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--red); }

/* BALANCE HERO */
.balance-hero {
  background: linear-gradient(135deg, #1A1630 0%, #120F2A 100%);
  border: 1px solid rgba(124,110,245,0.2);
  border-radius: var(--r-xl);
  padding: 24px 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.balance-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(124,110,245,0.2) 0%, transparent 70%);
  pointer-events: none;
}
.balance-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.balance-amount { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 700; margin-bottom: 16px; }
.balance-row { display: flex; gap: 20px; }
.balance-item { flex: 1; }
.balance-item-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.balance-item-value { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 600; }

/* CATEGORY LIST */
.cat-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--surface2); border-radius: var(--r-md);
  margin-bottom: 10px; cursor: move;
  border: 2px solid transparent; transition: all 0.15s;
}
.cat-list-item.dragging { opacity: 0.5; }
.cat-list-item.drag-over { border-color: var(--accent); background: rgba(124,110,245,0.08); }
.cat-icon { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: var(--r-sm); flex-shrink: 0; }
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.cat-budget { font-size: 12px; color: var(--text3); }
.cat-actions { display: flex; gap: 8px; }
.cat-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: background 0.15s; }
.cat-btn:hover { background: rgba(124,110,245,0.2); }
.cat-btn.delete:hover { background: rgba(240,96,96,0.2); }
.cat-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: rgba(124,110,245,0.1); color: var(--accent); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; max-width: 600px; margin: 0 auto;
  background: var(--surface);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transform: translateY(60px);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  max-height: 92vh;
  overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; border-radius: 100px; background: var(--border2); margin: 12px auto 0; }
.modal-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 18px; font-weight: 600; }
.modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
.modal-body { padding: 20px; }

/* FORMS */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: block; }
.form-input {
  width: 100%; padding: 14px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-md); font-size: 15px; color: var(--text);
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }

/* ICON PICKER */
.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.icon-option {
  padding: 12px; border-radius: var(--r-md); background: var(--surface2); border: 2px solid transparent;
  font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-option.selected { border-color: var(--accent); background: var(--accent-glow); }

/* COLOR PICKER */
.color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.color-option {
  width: 100%; aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent;
  cursor: pointer; transition: all 0.15s;
}
.color-option.selected { border-color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.5); }

/* BUTTONS */
.btn-primary {
  width: 100%; padding: 16px; border-radius: var(--r-lg);
  background: var(--accent); color: #fff;
  font-size: 16px; font-weight: 600; border: none; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-primary:active { transform: scale(0.98); background: var(--accent2); }

/* SECTION */
.section-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 10px; }
.section-title { font-size: 16px; font-weight: 600; }
.section-link { font-size: 13px; color: var(--accent); font-weight: 500; cursor: pointer; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 48px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.empty-text { font-size: 14px; color: var(--text2); }

/* DIALOG */
.dialog-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.dialog-overlay.open { opacity: 1; pointer-events: all; }
.dialog-box {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  max-width: 320px;
  text-align: center;
  transform: scale(0.9);
  transition: transform 0.2s;
}
.dialog-overlay.open .dialog-box { transform: scale(1); }
.dialog-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
.dialog-text { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.dialog-options { display: flex; gap: 10px; }
.dialog-btn { flex: 1; padding: 12px; border-radius: var(--r-md); font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; font-size: 14px; }
.dialog-btn.primary { background: var(--accent); color: #fff; }
.dialog-btn.secondary { background: var(--surface2); color: var(--text); }

/* MISC */
.amount-prefix { color: var(--text2); font-weight: 500; }
.amount-input-wrap { position: relative; }
.amount-field { padding-left: 48px !important; font-size: 22px !important; font-family: 'Space Grotesk'; font-weight: 600; }
.amount-prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); }

@media (min-width: 600px) {
  .scroll-area { padding: 0 20px 28px; }
  .modal-sheet { border-radius: var(--r-xl); margin-bottom: 40px; }
  .metric-grid { grid-template-columns: repeat(4, 1fr); }
  .icon-grid { grid-template-columns: repeat(8, 1fr); }
}
</style>
</head>
<body>
<div id="app">

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="top-bar">
      <div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:2px;">Good day 👋</div>
        <div class="top-bar-title display">Miza Finance</div>
      </div>
      <button class="top-bar-action" onclick="showView('view-settings')">⚙️</button>
    </div>
    <div class="scroll-area">
      <div style="height:16px"></div>

      <div class="balance-hero">
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount display" id="hero-balance">0 KD</div>
        <div class="balance-row">
          <div class="balance-item">
            <div class="balance-item-label">Income</div>
            <div class="balance-item-value display" id="hero-income">0 KD</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">Spent</div>
            <div class="balance-item-value display" id="hero-spent" style="color:var(--red)">0 KD</div>
          </div>
          <div class="balance-item">
            <div class="balance-item-label">Saved</div>
            <div class="balance-item-value display" id="hero-saved" style="color:var(--green)">0%</div>
          </div>
        </div>
      </div>

      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">Total Budget</div>
          <div class="metric-value display" id="m-total-budget">0 KD</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Total Spent</div>
          <div class="metric-value red display" id="m-total-spent">0 KD</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Remaining</div>
          <div class="metric-value green display" id="m-remaining">0 KD</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Budget Used</div>
          <div class="metric-value display" id="m-budget-pct">0%</div>
        </div>
      </div>

      <div class="section-head">
        <div class="section-title">Categories</div>
        <div class="section-link" onclick="showView('view-categories')">Manage</div>
      </div>
      <div id="dash-categories"></div>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="view" id="view-categories">
    <div class="top-bar">
      <div class="top-bar-title display">Categories</div>
      <button class="top-bar-action" onclick="openAddCategoryModal()">+</button>
    </div>
    <div class="scroll-area">
      <div style="height:12px"></div>
      <div id="cat-list-container"></div>
      <div style="height:20px"></div>
      <button class="btn-primary" onclick="restoreDefaultCategories()" style="margin:0 4px">Restore Defaults</button>
      <div style="height:20px"></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="view-settings">
    <div class="top-bar">
      <button style="font-size:22px;padding:4px;cursor:pointer" onclick="showView('view-dashboard')">←</button>
      <div class="top-bar-title display">Settings</div>
      <div style="width:36px"></div>
    </div>
    <div class="scroll-area">
      <div style="height:16px"></div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">Monthly Income</div>
        <div style="display:flex;gap:10px">
          <span style="font-size:15px;color:var(--text2);padding:12px 0">KD</span>
          <input class="form-input" type="number" id="income-input" placeholder="1800" min="0" style="flex:1"/>
          <button class="top-bar-action" onclick="saveIncome()" style="font-size:16px">✓</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-dashboard" onclick="showView('view-dashboard')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Dashboard</div>
    </button>
    <button class="nav-item" id="nav-categories" onclick="showView('view-categories')">
      <div class="nav-icon">📁</div>
      <div class="nav-label">Categories</div>
    </button>
    <button class="nav-item" id="nav-settings" onclick="showView('view-settings')">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">Settings</div>
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" onclick="openAddTransactionModal()">+</button>
</div>

<!-- ADD/EDIT CATEGORY MODAL -->
<div class="modal-overlay" id="modal-category">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-cat-title">New Category</div>
      <button class="modal-close" onclick="closeModal('modal-category')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Category Name</label>
        <input class="form-input" type="text" id="cat-name" placeholder="e.g. Groceries" maxlength="20"/>
      </div>

      <div class="form-group">
        <label class="form-label">Select Icon</label>
        <div class="icon-grid" id="cat-icon-grid"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Select Color</label>
        <div class="color-grid" id="cat-color-grid"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Monthly Budget (KD)</label>
        <div class="amount-input-wrap">
          <span class="amount-prefix">KD</span>
          <input class="form-input amount-field" type="number" id="cat-budget" placeholder="0.000" min="0" step="0.01" inputmode="decimal"/>
        </div>
      </div>

      <input type="hidden" id="cat-edit-id"/>
      <input type="hidden" id="cat-edit-is-default"/>
      
      <button class="btn-primary" onclick="saveCategory()" style="margin-top:8px">Save Category</button>
      <div id="cat-delete-btn" style="display:none;margin-top:10px"></div>
    </div>
  </div>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="modal-transaction">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Add Expense</div>
      <button class="modal-close" onclick="closeModal('modal-transaction')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Amount (KD)</label>
        <div class="amount-input-wrap">
          <span class="amount-prefix">KD</span>
          <input class="form-input amount-field" type="number" id="tx-amount" placeholder="0.000" min="0" step="0.001" inputmode="decimal"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="tx-category">
          <option value="">Uncategorized</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="tx-date"/>
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input class="form-input" type="text" id="tx-notes" placeholder="Add a note…" maxlength="100"/>
      </div>

      <button class="btn-primary" onclick="addTransaction()">Add Expense</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION DIALOG -->
<div class="dialog-overlay" id="dialog-delete">
  <div class="dialog-box">
    <div class="dialog-title">Delete Category?</div>
    <div class="dialog-text" id="dialog-delete-text"></div>
    <div class="dialog-options">
      <button class="dialog-btn secondary" onclick="closeDialog('dialog-delete')">Cancel</button>
      <button class="dialog-btn primary" id="dialog-delete-confirm" onclick="">Delete</button>
    </div>
  </div>
</div>

<!-- TRANSACTION HANDLING DIALOG -->
<div class="dialog-overlay" id="dialog-transactions">
  <div class="dialog-box">
    <div class="dialog-title">What to do with transactions?</div>
    <div class="dialog-text" id="dialog-tx-text"></div>
    <div class="dialog-options">
      <button class="dialog-btn secondary" id="dialog-tx-move" onclick="">Move to Uncategorized</button>
      <button class="dialog-btn primary" id="dialog-tx-delete" onclick="">Delete Transactions</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" integrity="sha512-eoNx7btVQMhpLU+EsHjzM/7ZvV+/FRAyY/HqAx6gKDKd0Vqt6CIgY2F/U9sS5O8vZgEAajnzWUPGGfPQ7aSA==" crossorigin="anonymous"></script>
<script>

// ============================================================
// DATA MODEL
// ============================================================
const STORE_KEY = 'miza_data_v4';
const DEFAULT_ICONS = ['🏠','🍽️','🚗','💡','🏥','👗','🎮','📚','💰','👨‍👩‍👧','📱','🛍️','✈️','🎬','📱'];
const DEFAULT_COLORS = ['#7C6EF5','#22D09A','#60A5FA','#F5B942','#F06060','#E879F9','#FB923C','#34D399','#FBBF24','#A78BFA','#38BDF8','#EF4444','#8B5CF6','#EC4899','#14B8A6'];

const DEFAULT_CATEGORIES = [
  { id: 'housing', name: 'Housing', icon: '🏠', color: '#7C6EF5', budget: 250, isDefault: true, isHidden: false, order: 0 },
  { id: 'food', name: 'Food', icon: '🍽️', color: '#22D09A', budget: 200, isDefault: true, isHidden: false, order: 1 },
  { id: 'transport', name: 'Transport', icon: '🚗', color: '#60A5FA', budget: 100, isDefault: true, isHidden: false, order: 2 },
  { id: 'utilities', name: 'Utilities', icon: '💡', color: '#F5B942', budget: 80, isDefault: true, isHidden: false, order: 3 },
  { id: 'health', name: 'Health', icon: '🏥', color: '#F06060', budget: 50, isDefault: true, isHidden: false, order: 4 },
  { id: 'clothing', name: 'Clothing', icon: '👗', color: '#E879F9', budget: 60, isDefault: true, isHidden: false, order: 5 },
  { id: 'entertain', name: 'Entertainment', icon: '🎮', color: '#FB923C', budget: 80, isDefault: true, isHidden: false, order: 6 },
  { id: 'education', name: 'Education', icon: '📚', color: '#34D399', budget: 40, isDefault: true, isHidden: false, order: 7 },
];

let DATA = {
  income: 1800,
  categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
  transactions: [],
  updatedAt: Date.now()
};

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      DATA = { ...DATA, ...loaded };
      if (!Array.isArray(DATA.categories)) DATA.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
      if (!DATA.transactions) DATA.transactions = [];
    }
  } catch(e) {}
}

function save() {
  DATA.updatedAt = Date.now();
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
}

function getCat(id) {
  return DATA.categories.find(c => c.id === id);
}

function getCatSpent(catId) {
  return DATA.transactions
    .filter(t => t.category === catId)
    .reduce((sum, t) => sum + parseFloat(t.amount || 0), 0);
}

function totalSpent() {
  return DATA.transactions.reduce((sum, t) => sum + parseFloat(t.amount || 0), 0);
}

function totalBudget() {
  return DATA.categories
    .filter(c => !c.isHidden)
    .reduce((sum, c) => sum + parseFloat(c.budget || 0), 0);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function fmt(n) { return parseFloat(n||0).toLocaleString('en-KW',{minimumFractionDigits:3,maximumFractionDigits:3}); }
function fmtShort(n) {
  const v = parseFloat(n||0);
  if (v >= 1000) return (v/1000).toFixed(1)+'K';
  return v.toLocaleString('en-KW',{minimumFractionDigits:0,maximumFractionDigits:0});
}

// ============================================================
// NAVIGATION
// ============================================================
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navId = 'nav-' + viewId.replace('view-', '');
  const nav = document.getElementById(navId);
  if (nav) nav.classList.add('active');
  if (viewId === 'view-dashboard') renderDashboard();
  if (viewId === 'view-categories') renderCategories();
}

// ============================================================
// MODALS & DIALOGS
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function openDialog(id) {
  document.getElementById(id).classList.add('open');
}

function closeDialog(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeModal(el.id);
  });
});

document.querySelectorAll('.dialog-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeDialog(el.id);
  });
});

// ============================================================
// CATEGORY MANAGEMENT
// ============================================================
let selectedCatIcon = null;
let selectedCatColor = null;

function buildIconGrid() {
  const grid = document.getElementById('cat-icon-grid');
  grid.innerHTML = DEFAULT_ICONS.map(icon => `
    <button class="icon-option ${icon === selectedCatIcon ? 'selected' : ''}" 
            onclick="selectCatIcon('${icon}', this)">${icon}</button>
  `).join('');
}

function buildColorGrid() {
  const grid = document.getElementById('cat-color-grid');
  grid.innerHTML = DEFAULT_COLORS.map(color => `
    <div class="color-option ${color === selectedCatColor ? 'selected' : ''}"
         style="background:${color}"
         onclick="selectCatColor('${color}', this)"></div>
  `).join('');
}

function selectCatIcon(icon, el) {
  selectedCatIcon = icon;
  document.querySelectorAll('.icon-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function selectCatColor(color, el) {
  selectedCatColor = color;
  document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function openAddCategoryModal() {
  selectedCatIcon = DEFAULT_ICONS[0];
  selectedCatColor = DEFAULT_COLORS[0];
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-budget').value = '';
  document.getElementById('cat-edit-id').value = '';
  document.getElementById('cat-edit-is-default').value = '';
  document.getElementById('modal-cat-title').textContent = 'New Category';
  document.getElementById('cat-delete-btn').style.display = 'none';
  buildIconGrid();
  buildColorGrid();
  openModal('modal-category');
}

function openEditCategoryModal(catId) {
  const cat = getCat(catId);
  if (!cat) return;
  selectedCatIcon = cat.icon;
  selectedCatColor = cat.color;
  document.getElementById('cat-name').value = cat.name;
  document.getElementById('cat-budget').value = cat.budget;
  document.getElementById('cat-edit-id').value = catId;
  document.getElementById('cat-edit-is-default').value = cat.isDefault ? '1' : '0';
  document.getElementById('modal-cat-title').textContent = 'Edit Category';
  buildIconGrid();
  buildColorGrid();
  
  const delBtn = document.getElementById('cat-delete-btn');
  if (!cat.isDefault) {
    delBtn.style.display = 'block';
    delBtn.innerHTML = `<button class="btn-primary" style="background:var(--red)" onclick="confirmDeleteCategory('${catId}')">Delete Category</button>`;
  } else {
    delBtn.style.display = 'none';
  }
  
  openModal('modal-category');
}

function saveCategory() {
  const name = document.getElementById('cat-name').value.trim();
  const budget = parseFloat(document.getElementById('cat-budget').value);
  const editId = document.getElementById('cat-edit-id').value;
  
  if (!name) { alert('Please enter a category name'); return; }
  if (!selectedCatIcon || !selectedCatColor) { alert('Please select icon and color'); return; }
  
  const isDuplicate = DATA.categories.some(c => 
    c.name.toLowerCase() === name.toLowerCase() && c.id !== editId
  );
  if (isDuplicate) { alert('Category name already exists'); return; }
  
  if (editId) {
    const idx = DATA.categories.findIndex(c => c.id === editId);
    if (idx >= 0) {
      DATA.categories[idx] = { ...DATA.categories[idx], name, icon: selectedCatIcon, color: selectedCatColor, budget: budget || 0 };
    }
  } else {
    const newCat = {
      id: uid(),
      name,
      icon: selectedCatIcon,
      color: selectedCatColor,
      budget: budget || 0,
      isDefault: false,
      isHidden: false,
      order: DATA.categories.length
    };
    DATA.categories.push(newCat);
  }
  
  save();
  closeModal('modal-category');
  renderDashboard();
  renderCategories();
}

function confirmDeleteCategory(catId) {
  const cat = getCat(catId);
  if (!cat) return;
  const txCount = DATA.transactions.filter(t => t.category === catId).length;
  
  document.getElementById('dialog-delete-text').textContent = `Delete "${cat.name}"? (${txCount} transaction${txCount !== 1 ? 's' : ''})`;
  document.getElementById('dialog-delete-confirm').onclick = () => {
    if (txCount > 0) {
      document.getElementById('dialog-tx-text').textContent = `This category has ${txCount} transaction${txCount !== 1 ? 's' : ''}. What should we do?`;
      document.getElementById('dialog-tx-move').onclick = () => {
        DATA.transactions.filter(t => t.category === catId).forEach(t => { t.category = null; });
        deleteCategory(catId);
        closeDialog('dialog-transactions');
        closeDialog('dialog-delete');
      };
      document.getElementById('dialog-tx-delete').onclick = () => {
        DATA.transactions = DATA.transactions.filter(t => t.category !== catId);
        deleteCategory(catId);
        closeDialog('dialog-transactions');
        closeDialog('dialog-delete');
      };
      closeDialog('dialog-delete');
      openDialog('dialog-transactions');
    } else {
      deleteCategory(catId);
      closeDialog('dialog-delete');
    }
  };
  openDialog('dialog-delete');
}

function deleteCategory(catId) {
  DATA.categories = DATA.categories.filter(c => c.id !== catId);
  save();
  closeModal('modal-category');
  renderDashboard();
  renderCategories();
}

function restoreDefaultCategories() {
  if (!confirm('Restore default categories? Custom categories will be deleted.')) return;
  DATA.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  save();
  renderCategories();
  renderDashboard();
  showToast('Defaults restored ✓');
}

// ============================================================
// TRANSACTION MANAGEMENT
// ============================================================
function openAddTransactionModal() {
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-category').value = '';
  document.getElementById('tx-date').value = today();
  document.getElementById('tx-notes').value = '';
  
  const sel = document.getElementById('tx-category');
  sel.innerHTML = '<option value="">Uncategorized</option>' +
    DATA.categories
      .filter(c => !c.isHidden)
      .sort((a, b) => a.order - b.order)
      .map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`)
      .join('');
  
  openModal('modal-transaction');
  setTimeout(() => document.getElementById('tx-amount').focus(), 300);
}

function addTransaction() {
  const amount = parseFloat(document.getElementById('tx-amount').value);
  if (!amount || amount <= 0) return;
  
  const tx = {
    id: uid(),
    amount,
    category: document.getElementById('tx-category').value || null,
    date: document.getElementById('tx-date').value || today(),
    notes: document.getElementById('tx-notes').value.trim()
  };
  
  DATA.transactions.unshift(tx);
  save();
  closeModal('modal-transaction');
  renderDashboard();
  renderCategories();
  showToast('Expense added ✓');
}

// ============================================================
// RENDERING
// ============================================================
function renderDashboard() {
  const income = parseFloat(DATA.income) || 0;
  const spent = totalSpent();
  const totalBud = totalBudget();
  const remaining = income - spent;
  const savePct = income > 0 ? Math.max(0, Math.round((remaining / income) * 100)) : 0;
  const budgetUsedPct = totalBud > 0 ? Math.round((spent / totalBud) * 100) : 0;
  
  document.getElementById('hero-balance').textContent = fmtShort(remaining) + ' KD';
  document.getElementById('hero-income').textContent = fmtShort(income) + ' KD';
  document.getElementById('hero-spent').textContent = fmtShort(spent) + ' KD';
  document.getElementById('hero-saved').textContent = savePct + '%';
  
  document.getElementById('m-total-budget').textContent = fmtShort(totalBud) + ' KD';
  document.getElementById('m-total-spent').textContent = fmtShort(spent) + ' KD';
  document.getElementById('m-remaining').textContent = fmtShort(remaining) + ' KD';
  document.getElementById('m-budget-pct').textContent = budgetUsedPct + '%';
  
  const catHtml = DATA.categories
    .filter(c => !c.isHidden)
    .sort((a, b) => a.order - b.order)
    .map(c => {
      const spent = getCatSpent(c.id);
      const remaining = c.budget - spent;
      const pct = c.budget > 0 ? Math.round((spent / c.budget) * 100) : 0;
      const status = spent > c.budget ? 'Over' : `${pct}%`;
      return `
        <div class="card" style="padding:14px;border-left:4px solid ${c.color}">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:500;margin-bottom:4px">${c.icon} ${c.name}</div>
              <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Budget: <strong>${fmt(c.budget)}</strong> · Spent: <strong>${fmt(spent)}</strong></div>
              <div style="height:4px;background:var(--surface2);border-radius:100px;overflow:hidden">
                <div style="height:100%;background:${c.color};width:${Math.min(100, pct)}%"></div>
              </div>
            </div>
            <div style="text-align:right;margin-left:12px;flex-shrink:0">
              <div style="font-size:14px;font-weight:600;color:${spent > c.budget ? '#F06060' : '#22D09A'}">${status}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:4px">${fmt(remaining)} left</div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  
  document.getElementById('dash-categories').innerHTML = catHtml || '<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No categories</div></div>';
}

function renderCategories() {
  const html = DATA.categories
    .sort((a, b) => a.order - b.order)
    .map((c, idx) => `
      <div class="cat-list-item" draggable="true" 
           data-cat-id="${c.id}"
           ondragstart="dragStart(event)"
           ondragover="dragOver(event)"
           ondrop="dragDrop(event)"
           ondragleave="dragLeave(event)">
        <div class="cat-icon" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${c.name}</div>
          <div class="cat-budget">Budget: ${fmt(c.budget)} KD · Spent: ${fmt(getCatSpent(c.id))} KD</div>
        </div>
        ${c.isHidden ? '<span class="cat-badge">Hidden</span>' : ''}
        ${c.isDefault ? '<span class="cat-badge">Default</span>' : ''}
        <div class="cat-actions">
          <button class="cat-btn" onclick="openEditCategoryModal('${c.id}')">✏️</button>
        </div>
      </div>
    `).join('');
  
  document.getElementById('cat-list-container').innerHTML = html || '<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No categories</div></div>';
}

// ============================================================
// DRAG & DROP
// ============================================================
let draggedEl = null;

function dragStart(e) {
  draggedEl = e.target.closest('.cat-list-item');
  draggedEl.classList.add('dragging');
}

function dragOver(e) {
  e.preventDefault();
  const target = e.target.closest('.cat-list-item');
  if (target && target !== draggedEl) {
    target.classList.add('drag-over');
  }
}

function dragLeave(e) {
  const target = e.target.closest('.cat-list-item');
  if (target) target.classList.remove('drag-over');
}

function dragDrop(e) {
  e.preventDefault();
  const target = e.target.closest('.cat-list-item');
  if (!target || !draggedEl) return;
  
  const draggedId = draggedEl.dataset.catId;
  const targetId = target.dataset.catId;
  
  if (draggedId !== targetId) {
    const draggedCat = getCat(draggedId);
    const targetCat = getCat(targetId);
    if (draggedCat && targetCat) {
      [draggedCat.order, targetCat.order] = [targetCat.order, draggedCat.order];
      save();
      renderCategories();
    }
  }
  
  draggedEl.classList.remove('dragging');
  target.classList.remove('drag-over');
}

// ============================================================
// SETTINGS
// ============================================================
function saveIncome() {
  const v = parseFloat(document.getElementById('income-input').value);
  if (!v || v <= 0) return;
  DATA.income = v;
  save();
  renderDashboard();
  showToast('Income updated ✓');
}

// ============================================================
// UTILITIES
// ============================================================
function showToast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:calc(var(--nav-h)+var(--safe-bottom)+80px);left:50%;transform:translateX(-50%);background:#1C1C2C;color:#fff;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;z-index:300;border:1px solid rgba(255,255,255,0.1);white-space:nowrap';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ============================================================
// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ============================================================
// INIT
// ============================================================
load();
document.getElementById('income-input').value = DATA.income;
renderDashboard();
renderCategories();
</script>
